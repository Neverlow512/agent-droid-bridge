adb:
  path: adb
  command_timeout: 30
  screenshot_timeout: 60
  ui_change_timeout: 10
  ui_change_poll_interval: 0.5

server:
  log_level: INFO

security:
  # ADB_EXECUTION_MODE env var: unrestricted | restricted (default: unrestricted)
  # ADB_ALLOW_SHELL env var: true | false (default: true)

  # restricted mode — only listed shell commands are permitted
  # example: ["dumpsys", "pm", "am"]
  shell_command_allowlist: []

  # unrestricted mode — listed shell commands are blocked (basename-matched)
  # example: ["rm", "reboot", "su"]
  shell_command_denylist: []

tools:
  # tool names listed here are hidden from the agent at server startup
  # example: ["execute_adb_command", "get_ui_hierarchy"]
  denied: []

extra_tool_packs:
  # optional feature modules loaded at startup — each pack registers a group of tools
  # example packs: debugging
  enabled: false
  packs: []
