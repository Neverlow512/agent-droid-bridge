# GitHub Actions workflow to build and publish agent-droid-bridge to PyPI
#
# Required GitHub Secrets:
#   - PYPI_TOKEN: API token for production PyPI
#   - TEST_PYPI_TOKEN: API token for TestPyPI
#   - SMITHERY_API_KEY: API token for Smithery registry

name: Build and Publish to PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip publishing, only run build"
        type: boolean
        default: false
        required: false

jobs:
  guard:
    name: Verify Tag is on Main
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if commit is on main
        id: check
        run: |
          if git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build Distribution Packages
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.on_main == 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Build Dependencies
        run: pip install hatchling

      - name: Build Wheel and SDist
        run: python -m hatchling build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    environment:
      name: testpypi
      url: https://test.pypi.org/p/agent-droid-bridge

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          print-hash: true

  smoke-test:
    name: Smoke Test from TestPyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract Version from Tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Wait for TestPyPI propagation
        run: sleep 30

      - name: Install from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ agent-droid-bridge==${{ env.VERSION }}

      - name: Verify --help Works
        run: agent-droid-bridge --help

      - name: Verify Output Contains "Agent Droid Bridge"
        run: agent-droid-bridge --help | grep -q "Agent Droid Bridge"

  publish-pypi:
    name: Publish to PyPI
    needs: smoke-test
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    environment:
      name: pypi
      url: https://pypi.org/p/agent-droid-bridge

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          print-hash: true

  create-github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract Changelog for This Version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## v${VERSION}/,/^## v[0-9]/" CHANGELOG.md | head -n -1)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG](https://github.com/Neverlow512/agent-droid-bridge/blob/main/CHANGELOG.md) for details."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: dist/*

  publish-mcp-registry:
    name: Publish to MCP Registry
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    continue-on-error: true
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Version from Tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update server.json version
        run: |
          python3 -c "
          import json, os
          with open('server.json') as f:
              data = json.load(f)
          data['version'] = os.environ['VERSION']
          data['packages'][0]['version'] = os.environ['VERSION']
          with open('server.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Install mcp-publisher CLI
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate with MCP Registry
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish

  publish-smithery:
    name: Publish to Smithery
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    continue-on-error: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Version from Tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update smithery-manifest.json version
        run: |
          python3 -c "
          import json, os
          with open('smithery-manifest.json') as f:
              data = json.load(f)
          data['version'] = os.environ['VERSION']
          with open('smithery-manifest.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Create MCPB bundle
        run: zip agent-droid-bridge.mcpb smithery-manifest.json

      - name: Publish to Smithery
        run: |
          curl -X PUT "https://api.smithery.ai/servers/Neverlow512%2Fagent-droid-bridge/releases" \
            -H "Authorization: Bearer ${{ secrets.SMITHERY_API_KEY }}" \
            -F "payload={\"type\":\"stdio\",\"version\":\"$VERSION\"}" \
            -F "bundle=@agent-droid-bridge.mcpb"
