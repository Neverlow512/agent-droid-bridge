# GitHub Actions workflow to build and publish agent-droid-bridge to PyPI
#
# Required GitHub Secrets:
#   - PYPI_TOKEN: API token for production PyPI
#   - TEST_PYPI_TOKEN: API token for TestPyPI

name: Build and Publish to PyPI

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip publishing, only run build"
        type: boolean
        default: false
        required: false

jobs:
  guard:
    name: Verify Tag is on Main
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check if commit is on main
        id: check
        run: |
          if git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

  update-changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.on_main == 'true'
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          ssh-key: ${{ secrets.CHANGELOG_DEPLOY_KEY }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract Commit Info and Update Changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DATE=$(date -u +%Y-%m-%d)
          # Find the squash merge commit — first feat/fix/perf/refactor commit reachable from the tag
          SQUASH=$(git log "${TAG}" --format="%H %s" | awk '/^[a-f0-9]+ (feat|fix|perf|refactor)\(/ {print $1; exit}')
          SUBJECT=$(git log -1 --format="%s" "$SQUASH")
          BODY=$(git log -1 --format="%b" "$SQUASH")

          CLEAN_SUBJECT=$(echo "$SUBJECT" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //')
          TYPE=$(echo "$SUBJECT" | sed 's/\([a-z]*\).*/\1/')

          case "$TYPE" in
            feat) CHANGE_TYPE="### Features" ;;
            fix) CHANGE_TYPE="### Bug Fixes" ;;
            refactor) CHANGE_TYPE="### Refactor" ;;
            perf) CHANGE_TYPE="### Performance" ;;
            *) CHANGE_TYPE="### Changes" ;;
          esac

          NEW_ENTRY="## v${VERSION} (${DATE})\n\n${CHANGE_TYPE}\n\n- ${CLEAN_SUBJECT}\n${BODY}\n"
          EXISTING=$(cat CHANGELOG.md)
          printf "%b\n%s" "$NEW_ENTRY" "$EXISTING" > CHANGELOG.md

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Commit and Push Changelog
        run: |
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG for v${VERSION}"
          git push origin main

  build:
    name: Build Distribution Packages
    runs-on: ubuntu-latest
    needs: [guard, update-changelog]
    if: needs.guard.outputs.on_main == 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set Up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Build Dependencies
        run: pip install hatchling==1.29.0

      - name: Build Wheel and SDist
        run: python -m hatchling build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    environment:
      name: testpypi
      url: https://test.pypi.org/p/agent-droid-bridge

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          print-hash: true

  smoke-test:
    name: Smoke Test from TestPyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Extract Version from Tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install from TestPyPI
        run: |
          for i in 1 2 3 4 5; do
            pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ agent-droid-bridge==${{ env.VERSION }} && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done

      - name: Verify --help Works
        run: agent-droid-bridge --help

      - name: Verify Output Contains "Agent Droid Bridge"
        run: agent-droid-bridge --help | grep -q "Agent Droid Bridge"

  publish-pypi:
    name: Publish to PyPI
    needs: smoke-test
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    environment:
      name: pypi
      url: https://pypi.org/p/agent-droid-bridge

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          print-hash: true

  create-github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Extract Changelog for This Version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## v${VERSION}/,/^## v[0-9]/" CHANGELOG.md | head -n -1)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG](https://github.com/Neverlow512/agent-droid-bridge/blob/main/CHANGELOG.md) for details."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: dist/*

  update-github-release:
    name: Update GitHub Release Body
    needs: [create-github-release, update-changelog]
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Extract Changelog for This Version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ESCAPED="${VERSION//./\\.}"
          BODY=$(awk "/^## v${ESCAPED}/{found=1} found && /^## v/ && !/^## v${ESCAPED}/{exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG](https://github.com/Neverlow512/agent-droid-bridge/blob/main/CHANGELOG.md) for details."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Update GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}

  publish-mcp-registry:
    name: Publish to MCP Registry
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    continue-on-error: true
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract Version from Tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update server.json version
        run: |
          python3 -c "
          import json, os
          with open('server.json') as f:
              data = json.load(f)
          data['version'] = os.environ['VERSION']
          data['packages'][0]['version'] = os.environ['VERSION']
          with open('server.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Install mcp-publisher CLI
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate with MCP Registry
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
